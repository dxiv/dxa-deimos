# Dependabot sometimes opens PRs that bump package.json before bun.lock is in sync.
# Regenerate the lockfile and push to the same branch so CI can use --frozen-lockfile.

name: Dependabot bun.lock sync

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - 'package.json'
      - 'bun.lock'

permissions:
  contents: write

concurrency:
  group: dependabot-bun-lock-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-lockfile:
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Regenerate bun.lock
        run: bun install

      - name: Commit and push if lockfile changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          if git diff --cached --quiet; then
            echo "bun.lock already matches package.json"
            exit 0
          fi
          git commit -m "chore(deps): sync bun.lock"
          git push
