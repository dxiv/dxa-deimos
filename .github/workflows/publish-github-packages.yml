# https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-npm-registry
#
# GitHub org is dxa-dev — npm.pkg.github.com requires the package scope to match
# the org (@dxa-dev). Public npm releases use @dxa-deimos/cli (npm org dxa-deimos).
# This job will fail while package.json name is @dxa-deimos/* — disable or align names.

name: Publish GitHub Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js (GitHub npm registry)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@dxa-dev"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI bundle
        run: bun run build

      - name: Publish to GitHub Packages
        run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
