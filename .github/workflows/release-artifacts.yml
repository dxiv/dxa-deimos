name: Release artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # dist/cli.mjs is executed with Node post-build; align toolchain with CI and package engines.
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI bundle
        run: bun run build

      - name: Upload dist/cli.mjs
        uses: actions/upload-artifact@v4
        with:
          name: dxa-agent-cli-${{ github.ref_name }}
          path: dist/cli.mjs
          if-no-files-found: error

      - name: Verify bundle with Node
        run: node dist/cli.mjs --version
