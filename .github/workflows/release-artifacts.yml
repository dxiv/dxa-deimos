name: Release artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # dist/cli.mjs is executed with Node post-build; align toolchain with CI and package engines.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI bundle
        run: bun run build

      - name: Upload dist/cli.mjs
        uses: actions/upload-artifact@v7
        with:
          name: deimos-cli-${{ github.ref_name }}
          path: dist/cli.mjs
          if-no-files-found: error

      - name: Verify bundle with Node
        run: node dist/cli.mjs --version
