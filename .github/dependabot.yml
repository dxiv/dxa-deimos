version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      bun-dependencies:
        patterns:
          - "*"

# Security updates (Dependabot alerts) are controlled in the repo UI:
# Settings → Code security and analysis → Dependabot alerts / security updates.
